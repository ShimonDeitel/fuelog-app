name: Fuelog
options:
  bundleIdPrefix: com.shimondeitel.fuelog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fuelog:
    type: application
    platform: iOS
    sources:
      - path: Fuelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuelog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fuelog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FuelogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FuelogTests
      - path: Fuelog.storekit
    dependencies:
      - target: Fuelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuelog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FuelogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FuelogUITests
    dependencies:
      - target: Fuelog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fuelog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fuelog:
    build:
      targets:
        Fuelog: all
        FuelogTests: [test]
        FuelogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fuelog.storekit
    test:
      config: Debug
      storeKitConfiguration: Fuelog.storekit
      targets:
        - FuelogTests
        - FuelogUITests
    archive:
      config: Release
